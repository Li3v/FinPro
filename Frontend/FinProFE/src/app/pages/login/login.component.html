<div class="login-page">
  <div class="login-container">
    <form class="login-form" (ngSubmit)="login()">
      <label
        >Username
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Username"
          required
        />
      </label>
      <label
        >Password
        <input
          type="text"
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
          required
        />
      </label>
      <button class="btn-login">Login</button>
    </form>
    <p class="register">
      Don't have an account?
      <a routerLink="/register">register</a>
    </p>

    <p class="errorMessage" *ngIf="error" style="color: crimson;">{{error}}</p>
  </div>
</div>
